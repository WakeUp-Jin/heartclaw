services:
  ruyi-api:
    build:
      context: .
      dockerfile: docker/ruyi-api.Dockerfile
    container_name: ruyi-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
      - docker/env/heartclaw.env
    environment:
      - HEARTCLAW_HOME=/root/.heartclaw
    volumes:
      - ${HEARTCLAW_HOME:-${HOME}/.heartclaw}:/root/.heartclaw

  tiangong-worker:
    build:
      context: .
      dockerfile: docker/tiangong-worker.Dockerfile
    container_name: tiangong-worker
    restart: unless-stopped
    env_file:
      - .env
      - docker/env/tiangong.env
    volumes:
      - ${HEARTCLAW_HOME:-${HOME}/.heartclaw}:/shared
      - ${HEARTCLAW_HOME:-${HOME}/.heartclaw}/tiangong/codex:/root/.codex
      - ${HEARTCLAW_HOME:-${HOME}/.heartclaw}/tiangong/kimi:/root/.kimi
      - ${HEARTCLAW_HOME:-${HOME}/.heartclaw}/tiangong/opencode:/root/.local/share/opencode
      - ${HEARTCLAW_HOME:-${HOME}/.heartclaw}/tiangong/opencode-config:/root/.config/opencode
      - ${HEARTCLAW_HOME:-${HOME}/.heartclaw}/tiangong/workspace:/workspace

  web:
    build:
      context: apps/web
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: heartclaw-web
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - ruyi-api
